            --success: #34C759;
            --warning: #FF9500;

        body {

        .safe-area-top {

        .date-badge { display: flex; flex-direction: column; align-items: center; background: #F2F2F7; padding: 6px 10px; border-radius: 8px; min-width: 45px; margin-right: 12px; }

        .date-badge .date { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .day-title { flex: 1; }
        .day-title h3 { margin: 0; font-size: 16px; font-weight: 600; }
        .day-title span { font-size: 12px; color: var(--text-sub); }
        .transport-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; margin-left: 8px; display: inline-block; transform: translateY(-1px); }
        
        .badge-nocar { background: #FFD6D6; color: #D80000; }
        .badge-car { background: #D6E4FF; color: #0055D8; }
        .badge-important { background: #E3F2FD; color: #1976D2; }
        
        .toggle-icon { color: var(--text-sub); transition: transform 0.3s ease; font-size: 14px; }
        .day-card.active .toggle-icon { transform: rotate(180deg); }
        
        .day-content { display: none; padding: 0 16px 20px 16px; border-top: 1px solid #F2F2F7; animation: slideDown 0.3s ease-out; }
        .day-card.active .day-content { display: block; }
        
        .timeline-item { position: relative; padding-left: 24px; margin-top: 20px; border-left: 2px solid #E5E5EA; }
        .timeline-item::before { content: ''; position: absolute; left: -6px; top: 0; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); border: 2px solid #fff; }
        
        .timeline-time { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
        .timeline-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; padding-right: 30px; }
        .timeline-desc { font-size: 13px; color: var(--text-sub); line-height: 1.4; }
        
        .tag { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #eee; color: #666; margin-top: 4px; }
        .tag.drive { background: #E8F5E9; color: #2E7D32; display: flex; align-items: center; width: fit-content; margin-bottom: 6px; font-weight: 600; }
        
        .map-btn { display: inline-flex; align-items: center; margin-top: 8px; font-size: 12px; color: var(--primary); text-decoration: none; font-weight: 500; margin-right: 12px; padding: 4px 8px; background: rgba(0,122,255,0.08); border-radius: 6px;}
        
        .hotel-info { background: #F2F2F7; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; display: flex; align-items: flex-start; position: relative;}
        .hotel-info i.hotel-icon { margin-right: 10px; color: var(--secondary); margin-top: 2px; flex-shrink: 0; }
        
        .edit-btn { position: absolute; right: 0; top: -5px; color: #C7C7CC; cursor: pointer; padding: 5px; font-size: 14px;}
        .edit-btn:active { color: var(--primary); }
        
        .notes-area { width: 100%; background: #FFF9C4; border: 1px solid #FFF59D; border-radius: 8px; padding: 10px; font-size: 13px; margin-top: 12px; font-family: inherit; resize: vertical; box-sizing: border-box; outline: none; transition: border 0.2s; }
        .notes-area:focus { border-color: #FBC02D; }
        .notes-area::placeholder { color: #A8A05B; }
        
        .edit-form { background: #F9F9F9; border-radius: 8px; padding: 12px; margin-top: 8px; border: 1px solid #E5E5EA; }
        .edit-input { width: 100%; background: #fff; border: 1px solid #E5E5EA; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; font-size: 13px; box-sizing: border-box; outline: none; }
        .edit-input:focus { border-color: var(--primary); }
        .edit-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; display: block; font-weight: 600; }
        
        .edit-actions { display: flex; justify-content: space-between; margin-top: 12px; border-top: 1px solid #E5E5EA; padding-top: 12px; }
        .btn-tool { background: #E5E5EA; color: var(--text-main); border: none; padding: 6px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-tool:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-tool:active:not(:disabled) { background: #D1D1D6; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; }
        .btn-cancel { background: #E5E5EA; color: var(--text-main); border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .btn-delete { background: #FFD6D6; color: #D80000; border: none; padding: 8px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: 8px; width: 100%; }

        .alert-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 10000; display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }

        .alert-content { padding: 20px 16px; }
        .alert-title { font-size: 17px; font-weight: 600; margin: 0 0 6px 0; color: #000; }
        .alert-msg { font-size: 13px; margin: 0; color: #000; line-height: 1.4;}
        .alert-buttons { display: flex; border-top: 1px solid rgba(60, 60, 67, 0.29); }

        .alert-btn.cancel { border-right: 1px solid rgba(60, 60, 67, 0.29); border-bottom-left-radius: 14px; }
        .alert-btn.destructive { color: var(--danger); font-weight: 600; border-bottom-right-radius: 14px; }

</head>

                    { id: "403-2", time: "14:30", title: "Meta Lab Burlingame", desc: "平日限定參訪", gmaps: "https://maps.app.goo.gl/BN44iJJ3Xrnb75aT6?g_st=ic", notes: "", driveTime: "約 25 分鐘" },
                    { id: "403-3", time: "16:00", title: "Google Visitor Experience", desc: "總部園區體驗", gmaps: "https://maps.app.goo.gl/ygYxM5k281TZf8Cg6?g_st=ic", notes: "", driveTime: "約 15 分鐘" },
                    { id: "403-4", time: "17:30", title: "住宿 Fairfield Inn San Jose", desc: "矽谷區住宿", gmaps: "https://maps.app.goo.gl/FLBKgiDLKqHGhENx6?g_st=ic", booking: "https://www.booking.com/Share-lo1y0b", notes: "", driveTime: "", isHotel: true }
                ]
            },
            {
                id: "day-4-4", day: "SAT", date: "04", title: "海岸與返程", subtitle: "Stanford & Carmel", transportBadge: { text: "開車自駕", type: "badge-car" },
                items: [
                    { id: "404-1", time: "09:00", title: "史丹佛大學 Stanford University", desc: "校園巡禮", gmaps: "https://maps.app.goo.gl/8DjjZQohKUNknpeW9?g_st=ic", notes: "", driveTime: "約 25 分鐘" },
                    { id: "404-2", time: "11:00", title: "Apple Park", desc: "訪客中心買紀念品", gmaps: "https://maps.app.goo.gl/KQytvajonFv5JhuU9?g_st=ic", notes: "", driveTime: "約 1.5 小時" },
                    { id: "404-3", time: "14:00", title: "卡梅爾海 & 17 Mile Dr", desc: "Carmel-by-the-Sea 藝術小鎮", gmaps: "https://maps.app.goo.gl/vWkLfuWp48GC1PKLA?g_st=ic", notes: "", driveTime: "約 30 分鐘" },
                    { id: "404-4", time: "16:00", title: "Bixby Bridge", desc: "一號公路經典地標", gmaps: "https://maps.app.goo.gl/RY1NxNm6YvtoGQe59?g_st=ic", notes: "", driveTime: "約 2.5 小時" },
                    { id: "404-5", time: "20:30", title: "AVIS 還車", desc: "機場還車", gmaps: "https://maps.app.goo.gl/fFTxp4G9Nc9Zciw5A?g_st=ic", notes: "", driveTime: "約 10 分鐘" },
                    { id: "404-6", time: "00:50", title: "4/5 搭機回台北", desc: "SFO 飛往 TPE (JX011)", gmaps: "", notes: "", driveTime: "", isHotel: true }
                ]
            }
        ];

        // 狀態變數
        let itinerary = [];
        let expandedDays = ['day-3-27'];
        let editingItemId = null;
        let saveTimeout = null;

        // 自訂 Alert 功能變數
        let alertCallback = null;

        // 初始化：讀取 iPhone/瀏覽器的 LocalStorage
        function initData() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    itinerary = JSON.parse(savedData);
                } catch(e) {
                    itinerary = JSON.parse(JSON.stringify(defaultItinerary));
                }
            } else {
                itinerary = JSON.parse(JSON.stringify(defaultItinerary));
            }
            render();
        }

        // 儲存資料到手機
        window.saveDataToLocal = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(itinerary));
            showSaveIndicator();
        };

        // 顯示已儲存提示動畫
        function showSaveIndicator() {
            const ind = document.getElementById('save-indicator');
            ind.classList.add('show');
            if (saveTimeout) clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                ind.classList.remove('show');
            }, 2000);
        }

        // 防 XSS
        function escapeHtml(unsafe) {
            if(!unsafe) return '';
            return unsafe.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // 自訂 iOS Alert 視窗
        window.showAlert = (title, msg, confirmText, callback) => {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-msg').innerText = msg;
            document.getElementById('alert-confirm-btn').innerText = confirmText;
            alertCallback = callback;
            document.getElementById('custom-alert').classList.add('show');
        };

        window.closeAlert = (confirmed) => {
            document.getElementById('custom-alert').classList.remove('show');
            if (alertCallback) {
                alertCallback(confirmed);
                alertCallback = null;
            }
        };

        // 渲染畫面
        function render() {
            const container = document.getElementById('app-content');
            let html = '';

            itinerary.forEach(day => {
                const isActive = expandedDays.includes(day.id) ? 'active' : '';
                html += `
                <div class="day-card ${isActive}">
                    <div class="day-header" onclick="window.toggleDay('${day.id}')">
                        <div class="date-badge">
                            <span class="day">${day.day}</span>
                            <span class="date">${day.date}</span>
                        </div>
                        <div class="day-title">
                            <h3>${day.title}</h3>
                            <span>${day.subtitle}</span>
                            ${day.transportBadge ? `<span class="transport-badge ${day.transportBadge.type}">${day.transportBadge.text}</span>` : ''}
                        </div>
                        <i class="fa-solid fa-chevron-down toggle-icon"></i>
                    </div>
                    
                    <div class="day-content">
                `;

                day.items.forEach((item, index) => {
                    if (editingItemId === item.id) {
                        html += renderEditForm(day.id, item, index, day.items.length);
                    } else {
                        html += renderItem(day.id, item, index);
                    }
                });

                html += `
                        <button class="btn-add-bottom" onclick="window.insertItem('${day.id}', ${day.items.length})">
                            <i class="fa-solid fa-plus"></i> 於本日最後新增行程點
                        </button>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        function renderItem(dayId, item, index) {
            const isHotel = item.isHotel || item.title.includes("住宿");
            const isFlight = item.title.includes("飛機") || item.title.includes("搭機");
            
            if (isHotel || isFlight) {
                return `
                <div class="hotel-info">
                    <i class="fa-solid ${isFlight ? 'fa-plane' : 'fa-bed'} hotel-icon"></i>
                    <div style="flex: 1">
                        <div style="font-weight: 600; color: var(--text-main); display: flex; justify-content: space-between;">
                            ${escapeHtml(item.time)} ${escapeHtml(item.title)}
                            <i class="fa-solid fa-pen edit-btn" style="position:static" onclick="window.startEdit('${item.id}')"></i>
                        </div>
                        ${item.desc ? `<div style="font-size: 12px; color: var(--text-sub); margin-top: 2px;">${escapeHtml(item.desc)}</div>` : ''}
                        
                        <div style="margin-top: 6px;">
                            ${item.gmaps ? `<a href="${item.gmaps}" target="_blank" class="map-btn" style="background: #fff; border: 1px solid #E5E5EA;"><i class="fa-solid fa-location-crosshairs"></i> 地圖</a>` : ''}
                            ${item.booking ? `<a href="${item.booking}" target="_blank" class="map-btn" style="background: #fff; border: 1px solid #E5E5EA; color: var(--secondary);"><i class="fa-solid fa-bed"></i> 訂房</a>` : ''}
                        </div>
                        <textarea class="notes-area" style="background: #fff; border: 1px solid #E5E5EA;" placeholder="✍️ 住宿備註 (輸入完點擊旁邊空白處自動儲存)..." onblur="window.updateNote('${dayId}', '${item.id}', this.value)">${escapeHtml(item.notes)}</textarea>
                    </div>
                </div>`;
            }

            return `
            <div class="timeline-item">
                <i class="fa-solid fa-pen edit-btn" onclick="window.startEdit('${item.id}')"></i>
                <div class="timeline-time">${escapeHtml(item.time)}</div>
                <div class="timeline-title">${escapeHtml(item.title)}</div>
                ${item.driveTime ? `<span class="tag drive"><i class="fa-solid fa-car"></i> 車程 ${escapeHtml(item.driveTime)}</span>` : ''}
                ${item.desc ? `<div class="timeline-desc">${escapeHtml(item.desc)}</div>` : ''}
                
                <div>
                    ${item.gmaps ? `<a href="${item.gmaps}" target="_blank" class="map-btn"><i class="fa-solid fa-location-crosshairs"></i> 導航</a>` : ''}
                    ${item.booking ? `<a href="${item.booking}" target="_blank" class="map-btn" style="color: var(--secondary); background: rgba(88, 86, 214, 0.08);"><i class="fa-solid fa-compass"></i> 預約/訂票</a>` : ''}
                </div>
                
                <textarea class="notes-area" placeholder="✍️ 點擊新增行程備註 (輸入完點擊旁邊自動儲存)..." onblur="window.updateNote('${dayId}', '${item.id}', this.value)">${escapeHtml(item.notes)}</textarea>
            </div>`;
        }

        function renderEditForm(dayId, item, index, length) {
            return `
            <div class="${item.isHotel ? 'hotel-info' : 'timeline-item'}" style="display: block; padding-bottom: 12px;">
                <div class="edit-form">
                    <label class="edit-label">時間 (例如 09:00)</label>
                    <input id="edit-time" value="${escapeHtml(item.time)}" class="edit-input" />
                    
                    <label class="edit-label">標題</label>
                    <input id="edit-title" value="${escapeHtml(item.title)}" class="edit-input" />
                    
                    <label class="edit-label">副標/描述</label>
                    <input id="edit-desc" value="${escapeHtml(item.desc)}" class="edit-input" />

                    <label class="edit-label">前往此地車程預估 (選填)</label>
                    <input id="edit-driveTime" value="${escapeHtml(item.driveTime)}" class="edit-input" placeholder="例如：約 30 分鐘" />

                    <label class="edit-label">Google Maps 連結</label>
                    <input id="edit-gmaps" value="${escapeHtml(item.gmaps)}" class="edit-input" />

                    <label class="edit-label">Booking/其他 連結</label>
                    <input id="edit-booking" value="${escapeHtml(item.booking)}" class="edit-input" />

                    <div class="edit-actions">
                        <div style="display: flex; gap: 8px;">
                            <button onclick="window.moveItem('${dayId}', ${index}, 'up')" ${index === 0 ? 'disabled' : ''} class="btn-tool"><i class="fa-solid fa-arrow-up"></i></button>
                            <button onclick="window.moveItem('${dayId}', ${index}, 'down')" ${index === length - 1 ? 'disabled' : ''} class="btn-tool"><i class="fa-solid fa-arrow-down"></i></button>
                            <button onclick="window.insertItem('${dayId}', ${index + 1})" class="btn-tool" style="color: var(--primary); background: rgba(0,122,255,0.1);"><i class="fa-solid fa-plus"></i> 插入</button>
                        </div>
                        
                        <div style="display: flex; gap: 8px;">
                            <button onclick="window.cancelEdit()" class="btn-cancel">取消</button>
                            <button onclick="window.saveEdit('${dayId}', '${item.id}')" class="btn-save"><i class="fa-solid fa-check"></i> 完成</button>
                        </div>
                    </div>
                    
                    <button onclick="window.deleteItem('${dayId}', '${item.id}')" class="btn-delete">
                        <i class="fa-solid fa-trash" style="margin-right: 6px;"></i> 刪除此行程
                    </button>
                </div>
            </div>`;
        }

        // 綁定所有操作事件
        window.toggleDay = (id) => {
            if (expandedDays.includes(id)) expandedDays = expandedDays.filter(d => d !== id);
            else expandedDays.push(id);
            render();
        };

        window.startEdit = (itemId) => { editingItemId = itemId; render(); };
        window.cancelEdit = () => { editingItemId = null; render(); };

        window.saveEdit = (dayId, itemId) => {
            const day = itinerary.find(d => d.id === dayId);
            const item = day.items.find(i => i.id === itemId);
            item.time = document.getElementById('edit-time').value;
            item.title = document.getElementById('edit-title').value;
            item.desc = document.getElementById('edit-desc').value;
            item.driveTime = document.getElementById('edit-driveTime').value;
            item.gmaps = document.getElementById('edit-gmaps').value;
            item.booking = document.getElementById('edit-booking').value;
            editingItemId = null;
            window.saveDataToLocal();
            render();
        };

        window.updateNote = (dayId, itemId, value) => {
            const day = itinerary.find(d => d.id === dayId);
            const item = day.items.find(i => i.id === itemId);
            if (item && item.notes !== value) {
                item.notes = value;
                window.saveDataToLocal(); // 更新備註後立刻存入手機
            }
        };

        window.insertItem = (dayId, index) => {
            const day = itinerary.find(d => d.id === dayId);
            const newItem = {
                id: `new-${Date.now()}`,
                time: "00:00", title: "新行程", desc: "", gmaps: "", booking: "", notes: "", driveTime: "", isHotel: false
            };
            day.items.splice(index, 0, newItem);
            editingItemId = newItem.id;
            window.saveDataToLocal();
            render();
        };

        window.deleteItem = (dayId, itemId) => {
            window.showAlert("刪除行程", "確定要刪除這個行程嗎？這將無法復原。", "刪除", function(confirmed) {
                if (!confirmed) return;
                const day = itinerary.find(d => d.id === dayId);
                day.items = day.items.filter(i => i.id !== itemId);
                editingItemId = null;
                window.saveDataToLocal();
                render();
            });
        };

        window.moveItem = (dayId, index, direction) => {
            const day = itinerary.find(d => d.id === dayId);
            if (direction === 'up' && index > 0) {
                [day.items[index - 1], day.items[index]] = [day.items[index], day.items[index - 1]];
            } else if (direction === 'down' && index < day.items.length - 1) {
                [day.items[index], day.items[index + 1]] = [day.items[index + 1], day.items[index]];
            }
            window.saveDataToLocal();
            render();
        };

        window.resetData = () => {
            window.showAlert("重置所有行程", "確定要清除所有修改，恢復成最初的預設行程嗎？這將無法復原。", "重置", function(confirmed) {
                if (!confirmed) return;
                localStorage.removeItem(STORAGE_KEY);
                initData();
            });
        };

        // 啟動應用程式
        initData();
    </script>
</body>
</html>
